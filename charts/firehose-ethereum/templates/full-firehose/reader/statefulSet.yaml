{{- $values := $.Values.fullMode }}
{{- $componentName := "reader" }}
{{- $componentLabel := include "firehose-ethereum.componentLabelFor" $componentName }}
{{- if and (eq .Values.mode "full") $values.components.reader.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-firehose-{{ $componentName }}
  labels:
    {{- include "firehose-ethereum.labels" . | nindent 4 }}
    {{- $componentLabel | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "firehose-ethereum.selectorLabels" . | nindent 6 }}
      {{- $componentLabel | nindent 6 }}
  volumeClaimTemplates:
    - metadata:
        name: storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: {{ $.Values.fullMode.storage.storageClass | quote }}
        resources:
          requests:
            storage: {{ $.Values.fullMode.storage.readerNode.size | quote }}
  replicas: {{ $values.components.reader.replicas }}
  template:
    metadata:
      annotations:
        checksum/jwt-secret: {{ include (print $.Template.BasePath "/full-firehose/reader/jwt-secret.yaml") . | sha256sum }}
        {{- with $values.components.reader.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "firehose-ethereum.selectorLabels" . | nindent 8 }}
        {{- $componentLabel | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "firehose-ethereum.serviceAccountName" . }}
      {{- with $values.components.reader.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.components.reader.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $values.components.reader.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ $componentName }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["fireeth"]
          args: ["start", "-c", "/config/config.yaml"]
          {{- include "firehose-ethereum.envVars" (dict "context" . "component" $values.components.reader) | nindent 10 }}
          {{- with $values.components.reader.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: grpc
              containerPort: 10010
              protocol: TCP
            - name: prom
              containerPort: 9102
              protocol: TCP
            - name: geth-jsonrpc
              containerPort: 8545
              protocol: TCP
            - name: geth-auth
              containerPort: 8551
              protocol: TCP
          volumeMounts:
            - name: config-volume
              mountPath: /config
            - name: storage
              mountPath: /app/firehose-data
            - name: jwt-secret
              mountPath: /jwt
              readOnly: true
        {{- if $values.components.opNode.enabled }}
        - name: op-node
          image: "{{ $values.components.opNode.image.repository }}:{{ $values.components.opNode.image.tag }}"
          imagePullPolicy: {{ $values.components.opNode.image.pullPolicy }}
          command:
            - op-node
          args:
            - --network={{ $values.components.opNode.config.network }}
            - --l1={{ $values.components.opNode.config.l1 }}
            - --l1.beacon={{ $values.components.opNode.config.l1Beacon }}
            - --l1.beacon-archiver={{ $values.components.opNode.config.l1BeaconArchiver }}
            - --l1.beacon.fetch-all-sidecars=true
            - --l1.rpckind={{ $values.components.opNode.config.l1RpcKind }}
            - --l1.trustrpc={{ $values.components.opNode.config.l1TrustRpc }}
            - --l2=http://localhost:8551
            - --l2.enginekind=geth
            - --l2.jwt-secret=/jwt/jwt.hex
            - --syncmode=execution-layer
            - --verifier.l1-confs=4
            - --log.color=true
            - --log.format=logfmt
            - --metrics.enabled=true
            - --metrics.port=7300
            - --rpc.addr=0.0.0.0
            - --rpc.port=9545
            - --p2p.listen.ip=0.0.0.0
            - --p2p.listen.tcp=9222
            {{- with $values.components.opNode.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with $values.components.opNode.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: opnode-rpc
              containerPort: 9545
              protocol: TCP
            - name: opnode-metrics
              containerPort: 7300
              protocol: TCP
            - name: opnode-p2p-tcp
              containerPort: 9222
              protocol: TCP
            - name: opnode-p2p-udp
              containerPort: 9222
              protocol: UDP
          volumeMounts:
            - name: jwt-secret
              mountPath: /jwt
              readOnly: true
        {{- end }}
        {{- if $values.components.baseConsensus.enabled }}
        - name: base-consensus
          image: "{{ $values.components.baseConsensus.image.repository }}:{{ $values.components.baseConsensus.image.tag }}"
          imagePullPolicy: {{ $values.components.baseConsensus.image.pullPolicy }}
          workingDir: /app
          command:
            - /app/base-consensus
          args:
            - node
            - --chain={{ $values.components.baseConsensus.config.chain }}
            - --l1-eth-rpc={{ $values.components.baseConsensus.config.l1EthRpc }}
            - --l1-beacon={{ $values.components.baseConsensus.config.l1Beacon }}
            - --safedb.path={{ $values.components.baseConsensus.config.safedbPath }}
            {{- if $values.components.baseConsensus.config.l2TrustRpc }}
            - --l2-trust-rpc
            {{- end }}
            {{- if $values.components.baseConsensus.config.l1TrustRpc }}
            - --l1-trust-rpc
            {{- end }}
            - --l2-engine-rpc=http://localhost:8551
            - --l2-engine-jwt-secret=/jwt/jwt.hex
            - --metrics.enabled
            - --metrics.port=7300
            - --rpc.addr=0.0.0.0
            - --port=9545
            - --p2p.priv.path={{ $values.components.baseConsensus.config.p2pPrivPath }}
            - --p2p.bootnodes={{ $values.components.baseConsensus.config.p2pBootnodes }}
            - --p2p.listen.ip=0.0.0.0
            - --p2p.listen.tcp=9222
            {{- with $values.components.baseConsensus.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - containerPort: 9545
              name: bc-rpc
            - containerPort: 7300
              name: bc-metrics
            - containerPort: 9222
              name: bc-p2p-tcp
              protocol: TCP
            - containerPort: 9222
              name: bc-p2p-udp
              protocol: UDP
          startupProbe:
            tcpSocket:
              port: bc-rpc
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 60
          livenessProbe:
            tcpSocket:
              port: bc-rpc
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: bc-rpc
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          securityContext:
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 1000
          {{- with $values.components.baseConsensus.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: storage
              mountPath: /data
            - name: jwt-secret
              mountPath: /jwt
              readOnly: true
        {{- end }}
      volumes:
        - name: config-volume
          configMap:
            name: {{ .Release.Name }}-firehose-{{ $componentName }}-config
        - name: jwt-secret
          secret:
            secretName: {{ .Release.Name }}-firehose-jwt
{{- end }}
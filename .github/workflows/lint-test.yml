name: Lint and Test Charts

on:
  pull_request:
    paths:
      - "charts/**"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.7.0

      - name: List changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "charts<<EOF"
            echo "$changed"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install helm-docs
        if: steps.list-changed.outputs.changed == 'true'
        env:
          HELM_DOCS_VERSION: "1.14.2"
        run: |
          curl -sSL "https://github.com/norwoodj/helm-docs/releases/download/v${HELM_DOCS_VERSION}/helm-docs_${HELM_DOCS_VERSION}_Linux_x86_64.tar.gz" | tar -xz
          sudo mv helm-docs /usr/local/bin/helm-docs

      - name: Generate chart docs
        if: steps.list-changed.outputs.changed == 'true'
        env:
          CHANGED_CHARTS: ${{ steps.list-changed.outputs.charts }}
        run: |
          while IFS= read -r chart; do
            [[ -n "$chart" ]] || continue
            helm-docs --chart-search-root charts --chart-to-generate "$chart"
          done <<< "$CHANGED_CHARTS"

      - name: Generate root README chart table
        run: ./scripts/update-available-charts.sh

      - name: Verify generated docs are up to date
        env:
          CHANGED_CHARTS: ${{ steps.list-changed.outputs.charts }}
        run: |
          paths=(README.md)
          while IFS= read -r chart; do
            [[ -n "$chart" ]] || continue
            paths+=("$chart")
          done <<< "$CHANGED_CHARTS"
          if ! git diff --exit-code -- "${paths[@]}"; then
            echo "Generated chart docs or README.md available charts table are out of date."
            echo "Run: helm-docs --chart-search-root charts --chart-to-generate <chart-path>"
            echo "Run: ./scripts/update-available-charts.sh"
            exit 1
          fi

      - name: Lint charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

      - name: Create Kind cluster
        if: steps.list-changed.outputs.changed == 'true'
        uses: helm/kind-action@v1.12.0

      - name: Install and test charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml
